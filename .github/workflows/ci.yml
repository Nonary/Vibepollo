---
name: CI
permissions: {}

on:
  workflow_dispatch:
  push:
    branches:
      - vibe
      - main
      - master
    tags:
      - '*'
  pull_request:
    branches:
      - vibe
      - main
      - master

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows
    permissions:
      contents: read
    uses: ./.github/workflows/ci-windows.yml
    with:
      release_commit: ${{ github.sha }}
      release_version: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '0.0.0' }}

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Resolve release metadata
        id: release-metadata
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "${TAG_NAME}" == v* ]]; then
            echo "::error::Release tags should not include a v prefix. Use '${TAG_NAME#v}' instead of '${TAG_NAME}'."
            exit 1
          fi

          if [[ "${TAG_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)([.-][0-9A-Za-z.-]+)?$ ]]; then
            prerelease=true
          elif [[ "${TAG_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-stable)?$ ]]; then
            prerelease=false
          else
            echo "::error::Unsupported release tag '${TAG_NAME}'. Use an unsuffixed or -stable semantic version for stable releases, or -alpha/-beta/-rc for pre-releases."
            exit 1
          fi

          notes_file="release_notes/${TAG_NAME}.md"
          if [[ -f "${notes_file}" ]]; then
            echo "Using release notes: ${notes_file}"
            echo "notes_file=${notes_file}" >> "${GITHUB_OUTPUT}"
            echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Release notes file not found: ${notes_file}"
          exit 1

      - name: Download Windows artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          name: build-Windows
          path: artifacts

      - name: Debug artifacts
        run: ls -l artifacts

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES_FILE: ${{ steps.release-metadata.outputs.notes_file }}
          TAG_NAME: ${{ github.ref_name }}
          PRERELEASE: ${{ steps.release-metadata.outputs.prerelease }}
        run: |
          set -euo pipefail
          release_title="v${TAG_NAME}"

          release_args=(
            --title "${release_title}"
            --notes-file "${NOTES_FILE}"
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" "${release_args[@]}"
            gh release upload "${TAG_NAME}" artifacts/* --clobber
          else
            gh release create "${TAG_NAME}" artifacts/* "${release_args[@]}"
          fi

          # Be explicit when updating existing releases too. The GitHub CLI can
          # mark a release as pre-release, but this API patch also clears the
          # pre-release flag for unsuffixed/-stable tags.
          release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME}" --jq .id)
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F prerelease="${PRERELEASE}" \
            >/dev/null
