---
name: CI-Windows
permissions:
  contents: read

on:
  workflow_call:
    inputs:
      release_commit:
        required: true
        type: string
      release_version:
        required: true
        type: string
      symbol_product_name:
        required: true
        type: string
      symbol_release_prefix:
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false
      symbol_token:
        required: false

jobs:
  build_windows:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: msys2 {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-2022
            arch: x86_64
            msystem: ucrt64
            toolchain: ucrt-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Prepare tests
        id: prepare-tests
        if: false  # todo: DirectX11 is not available, so even software encoder fails
        shell: pwsh
        run: |
          # function to download and extract a zip file
          function DownloadAndExtract {
            param (
              [string]$Uri,
              [string]$OutFile
            )

            $maxRetries = 5
            $retryCount = 0
            $success = $false

            while (-not $success -and $retryCount -lt $maxRetries) {
              $retryCount++
              Write-Host "Downloading $Uri to $OutFile, attempt $retryCount of $maxRetries"
              try {
                Invoke-WebRequest -Uri $Uri -OutFile $OutFile
                $success = $true
              } catch {
                Write-Host "Attempt $retryCount of $maxRetries failed with error: $($_.Exception.Message). Retrying..."
                Start-Sleep -Seconds 5
              }
            }

            if (-not $success) {
              Write-Host "Failed to download the file after $maxRetries attempts."
              exit 1
            }

            # use .NET to get the base name of the file
            $baseName = (Get-Item $OutFile).BaseName

            # Extract the zip file
            Expand-Archive -Path $OutFile -DestinationPath $baseName
          }

          # virtual display driver
          DownloadAndExtract `
            -Uri "https://www.amyuni.com/downloads/usbmmidd_v2.zip" `
            -OutFile "usbmmidd_v2.zip"

          # install
          Set-Location -Path usbmmidd_v2/usbmmidd_v2
          ./deviceinstaller64 install usbmmidd.inf usbmmidd

          # create the virtual display
          ./deviceinstaller64 enableidd 1

          # move up a directory
          Set-Location -Path ../..

          # install devcon
          DownloadAndExtract `
            -Uri "https://github.com/Drawbackz/DevCon-Installer/releases/download/1.4-rc/Devcon.Installer.zip" `
            -OutFile "Devcon.Installer.zip"
          Set-Location -Path Devcon.Installer
          # hash needs to match OS version
          # https://github.com/Drawbackz/DevCon-Installer/blob/master/devcon_sources.json
          Start-Process -FilePath "./Devcon Installer.exe" -Wait -ArgumentList `
            'install', `
            '-hash', '54004C83EE34F6A55380528A8B29F4C400E61FBB947A19E0AB9E5A193D7D961E', `
            '-addpath', `
            '-update', `
            '-dir', 'C:\Windows\System32'

          # disable Hyper-V Video
          # https://stackoverflow.com/a/59490940
          C:\Windows\System32\devcon.exe disable "VMBUS\{da0a7802-e377-4aac-8e77-0558eb1073f8}"

          # move up a directory
          Set-Location -Path ..

          # multi monitor tool
          DownloadAndExtract `
            -Uri "http://www.nirsoft.net/utils/multimonitortool-x64.zip" `
            -OutFile "multimonitortool.zip"

          # enable the virtual display
          # http://www.nirsoft.net/utils/multi_monitor_tool.html
          Set-Location -Path multimonitortool

          # Original Hyper-V is \\.\DISPLAY1, it will recreate itself as \\.\DISPLAY6 (or something higher than 2)
          # USB Mobile Monitor Virtual Display is \\.\DISPLAY2

          # these don't seem to work if not using runAs
          # todo: do they work if not using runAs?
          Start-Process powershell -Verb runAs -ArgumentList '-Command ./MultiMonitorTool.exe /enable \\.\DISPLAY2'
          Start-Process powershell -Verb runAs -ArgumentList '-Command ./MultiMonitorTool.exe /SetPrimary \\.\DISPLAY2'

          # wait a few seconds
          Start-Sleep -s 5

          # list monitors
          ./MultiMonitorTool.exe /stext monitor_list.txt

          # wait a few seconds
          Start-Sleep -s 5

          # print the monitor list
          Get-Content -Path monitor_list.txt

      - name: Setup Dependencies Windows
        # if a dependency needs to be pinned, see https://github.com/LizardByte/build-deps/pull/186
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            wget

      - name: Update Windows dependencies
        env:
          MSYSTEM: ${{ matrix.msystem }}
          TOOLCHAIN: ${{ matrix.toolchain }}
        shell: msys2 {0}
        run: |
          # variables
          declare -A pinned_deps

          # dependencies
          dependencies=(
            "git"
            "mingw-w64-${TOOLCHAIN}-cmake"
            "mingw-w64-${TOOLCHAIN}-cppwinrt"
            "mingw-w64-${TOOLCHAIN}-curl-winssl"
            "mingw-w64-${TOOLCHAIN}-gcc"
            "mingw-w64-${TOOLCHAIN}-graphviz"
            "mingw-w64-${TOOLCHAIN}-MinHook"
            "mingw-w64-${TOOLCHAIN}-miniupnpc"
            "mingw-w64-${TOOLCHAIN}-nlohmann-json"
            "mingw-w64-${TOOLCHAIN}-nodejs"
            "mingw-w64-${TOOLCHAIN}-nsis"
            "mingw-w64-${TOOLCHAIN}-onevpl"
            "mingw-w64-${TOOLCHAIN}-openssl"
            "mingw-w64-${TOOLCHAIN}-opus"
            "mingw-w64-${TOOLCHAIN}-toolchain"
          )

          # do not modify below this line

          ignore_packages=()
          tarballs=""
          for pkg in "${!pinned_deps[@]}"; do
            ignore_packages+=("${pkg}")
            version="${pinned_deps[$pkg]}"
            tarball="${pkg}-${version}-any.pkg.tar.zst"

            # download working version
            wget "https://repo.msys2.org/mingw/${MSYSTEM}/${tarball}"

            tarballs="${tarballs} ${tarball}"
          done

          # Create the ignore string for pacman
          ignore_list=$(IFS=,; echo "${ignore_packages[*]}")

          # install pinned dependencies
          if [ -n "${tarballs}" ]; then
            pacman -U --noconfirm "${tarballs}"
          fi

          # Only add --ignore if we have packages to ignore
          if [ -n "${ignore_list}" ]; then
            pacman -Syu --noconfirm --ignore="${ignore_list}" "${dependencies[@]}"
          else
            pacman -Syu --noconfirm "${dependencies[@]}"
          fi

      - name: Install Doxygen
        # GCC compiled doxygen has issues when running graphviz
        env:
          DOXYGEN_VERSION: "1.11.0"
        shell: pwsh
        run: |
          # Set version variables
          $doxy_ver = $env:DOXYGEN_VERSION
          $_doxy_ver = $doxy_ver.Replace(".", "_")

          # Download the Doxygen installer
          Invoke-WebRequest -Uri `
            "https://github.com/doxygen/doxygen/releases/download/Release_${_doxy_ver}/doxygen-${doxy_ver}-setup.exe" `
            -OutFile "doxygen-setup.exe"

          # Run the installer
          Start-Process `
            -FilePath .\doxygen-setup.exe `
            -ArgumentList `
              '/VERYSILENT' `
          -Wait `
          -NoNewWindow

          # Clean up
          Remove-Item -Path doxygen-setup.exe

      - name: Setup python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Python Path
        id: python-path
        shell: msys2 {0}
        run: |
          # replace backslashes with double backslashes
          python_path=$(echo "${{ steps.setup-python.outputs.python-path }}" | sed 's/\\/\\\\/g')

          # step output
          echo "python-path=${python_path}"
          echo "python-path=${python_path}" >> "${GITHUB_OUTPUT}"

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          choco install wixtoolset -y

      - name: Install cv2pdb
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          CV2PDB_VERSION: "0.54"
        run: |
          $ErrorActionPreference = 'Stop'
          $cv2pdbDir = Join-Path $env:RUNNER_TEMP 'cv2pdb'
          $cv2pdbZip = Join-Path $env:RUNNER_TEMP 'cv2pdb.zip'
          $cv2pdbUrl = "https://github.com/rainers/cv2pdb/releases/download/v${env:CV2PDB_VERSION}/cv2pdb-${env:CV2PDB_VERSION}.zip"

          Invoke-WebRequest -Uri $cv2pdbUrl -OutFile $cv2pdbZip
          Expand-Archive -Path $cv2pdbZip -DestinationPath $cv2pdbDir -Force
          $cv2pdbExe = Get-ChildItem -Path $cv2pdbDir -Recurse -Filter cv2pdb64.exe -File | Select-Object -First 1
          if (-not $cv2pdbExe) {
            throw 'cv2pdb64.exe was not found in the downloaded archive.'
          }
          Add-Content -Path $env:GITHUB_PATH -Value (Split-Path $cv2pdbExe.FullName -Parent)

      - name: Build Windows
        shell: msys2 {0}
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          COMMIT: ${{ inputs.release_commit }}
          MATRIX_MSYSTEM: ${{ matrix.msystem }}
          RAW_BUILD_VERSION: ${{ inputs.release_version }}
        run: |
          build_version="${RAW_BUILD_VERSION}"
          if [[ "${build_version}" =~ ^v(.+)$ ]]; then
            build_version="${BASH_REMATCH[1]}"
          fi
          export BUILD_VERSION="${build_version}"

          # setup NodeJS PATH
          if [[ "${MATRIX_MSYSTEM}" != "ucrt64" ]]; then
            NODEJS_PATH=$(cygpath "$NODEJS_PATH")
            export PATH="$PATH:$NODEJS_PATH"
          fi

          mkdir -p build
          cmake \
            -B build \
            -G Ninja \
            -S . \
            -DBUILD_WERROR=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DSUNSHINE_ASSETS_DIR=assets \
            -DSUNSHINE_PUBLISHER_NAME='${{ github.repository_owner }}' \
            -DSUNSHINE_PUBLISHER_WEBSITE='https://app.lizardbyte.dev' \
            -DSUNSHINE_PUBLISHER_ISSUE_URL='https://app.lizardbyte.dev/support'
          echo "::add-matcher::.github/matchers/gcc.json"
          ninja -C build
          echo "::remove-matcher owner=gcc::"

      - name: Generate Windows PDB
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $executables = @(
            '.\build\sunshine.exe',
            '.\build\tools\audio-info.exe',
            '.\build\tools\dxgi-info.exe',
            '.\build\tools\playnite-launcher.exe',
            '.\build\tools\sunshine_display_helper.exe',
            '.\build\tools\sunshine_wgc_capture.exe',
            '.\build\tools\sunshinesvc.exe'
          )

          foreach ($exe in $executables) {
            if (Test-Path -LiteralPath $exe) {
              & cv2pdb64.exe $exe
            }
          }

          $sunshineSvc = '.\build\tools\sunshinesvc.exe'
          $sunshineSvcPayload = '.\build\wix_payload\tools\sunshinesvc.exe'
          if ((Test-Path -LiteralPath $sunshineSvc) -and (Test-Path -LiteralPath $sunshineSvcPayload)) {
            Copy-Item -LiteralPath $sunshineSvc -Destination $sunshineSvcPayload -Force
          }

      - name: Package Windows Symbols
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          SYMBOL_PRODUCT_NAME: ${{ inputs.symbol_product_name }}
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseVersion = $env:RELEASE_VERSION
          if ($releaseVersion -match '^v(.+)$') {
            $releaseVersion = $Matches[1]
          }

          $symbolsRoot = Join-Path $PWD 'symbols'
          $artifactName = "$($env:SYMBOL_PRODUCT_NAME)Symbols-$releaseVersion-windows-x64.7z"
          $artifactPath = Join-Path $symbolsRoot $artifactName

          New-Item -ItemType Directory -Force -Path $symbolsRoot | Out-Null

          $pdbFiles = Get-ChildItem -Path build -Recurse -Filter *.pdb -File |
            Where-Object { $_.FullName -notlike '*\cpack_artifacts\*' }

          if (-not $pdbFiles) {
            throw 'No PDB files were produced.'
          }

          $buildRoot = (Resolve-Path build).Path
          $pdbPaths = @($pdbFiles | ForEach-Object { [System.IO.Path]::GetRelativePath($buildRoot, $_.FullName) })
          Push-Location $buildRoot
          try {
            & 7z a $artifactPath $pdbPaths
          } finally {
            Pop-Location
          }

      - name: Strip Windows binaries
        shell: msys2 {0}
        run: |
          set -euo pipefail

          mapfile -d '' binaries < <(
            find build -type f \( -name '*.exe' -o -name '*.dll' \) \
              ! -path '*/cpack_artifacts/*' \
              ! -path '*/CMakeFiles/*' \
              ! -path '*/_deps/*' \
              ! -path '*/tests/*' \
              -print0
          )

          if (( ${#binaries[@]} == 0 )); then
            echo "No Windows binaries found to strip."
            exit 0
          fi

          strip --strip-debug --strip-unneeded "${binaries[@]}"

      # WiX already installed before configure so env:WIX is available

      - name: Package Windows
        shell: msys2 {0}
        env:
          SYMBOL_PRODUCT_NAME: ${{ inputs.symbol_product_name }}
        run: |
          mkdir -p artifacts
          cd build

          set -euo pipefail

          # package
          cpack -G WIX
          cpack -G ZIP

          # build the custom setup executable that wraps the MSI payload
          powershell -NoProfile -ExecutionPolicy Bypass -File ../packaging/windows/bootstrapper/build_bootstrapper.ps1 -BuildDir "$(cygpath -w "$(pwd)")"

          msi_file=$(find ./cpack_artifacts -maxdepth 1 -type f -name '*.msi' | sort | head -n 1)
          installer_name="${SYMBOL_PRODUCT_NAME}Setup.exe"
          installer_exe="./cpack_artifacts/${installer_name}"
          portable_zip=$(find ./cpack_artifacts -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)

          if [[ -z "${msi_file}" ]]; then
            echo "No MSI package was produced." >&2
            find ./cpack_artifacts -maxdepth 2 -type f -print >&2 || true
            exit 1
          fi

          if [[ ! -f "${installer_exe}" ]]; then
            fallback_installer=$(find ./cpack_artifacts -maxdepth 1 -type f -name '*Setup.exe' | sort | head -n 1)
            if [[ -z "${fallback_installer}" ]]; then
              echo "Expected setup executable was not produced: ${installer_exe}" >&2
              find ./cpack_artifacts -maxdepth 2 -type f -print >&2 || true
              exit 1
            fi
            installer_exe="${fallback_installer}"
            installer_name="$(basename "${installer_exe}")"
          fi

          if [[ -z "${portable_zip}" ]]; then
            echo "No portable ZIP package was produced." >&2
            find ./cpack_artifacts -maxdepth 2 -type f -print >&2 || true
            exit 1
          fi

          # Keep generated package names intact. In particular, do not rename
          # VibepolloSetup.exe; downstream release/install docs expect that name.
          cp "${msi_file}" "../artifacts/$(basename "${msi_file}")"
          cp "${installer_exe}" "../artifacts/${installer_name}"
          cp "${portable_zip}" "../artifacts/$(basename "${portable_zip}")"

      - name: Debug nsis
        if: always()
        shell: msys2 {0}
        run: cat ./build/cpack_artifacts/_CPack_Packages/win64/NSIS/NSISOutput.log || true

      - name: Debug wix
        if: always()
        shell: msys2 {0}
        run: cat ./build/cpack_artifacts/_CPack_Packages/win64/WIX/wix.log || true

      - name: Run tests
        id: test
        shell: msys2 {0}
        working-directory: build/tests
        run: ./test_sunshine.exe --gtest_color=yes --gtest_output=xml:test_results.xml

      - name: Generate gcov report
        id: test_report
        # any except canceled or skipped
        if: always() && (steps.test.outcome == 'success' || steps.test.outcome == 'failure')
        shell: msys2 {0}
        working-directory: build
        run: |
          ${{ steps.python-path.outputs.python-path }} -m pip install gcovr
          ${{ steps.python-path.outputs.python-path }} -m gcovr . -r ../src \
            --exclude-noncode-lines \
            --exclude-throw-branches \
            --exclude-unreachable-branches \
            --verbose \
            --xml-pretty \
            -o coverage.xml

      - name: Upload coverage artifact
        if: >-
          always() &&
          (steps.test_report.outcome == 'success')
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.name }}
          path: |
            build/coverage.xml
            build/tests/test_results.xml
          if-no-files-found: error

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.name }}
          path: artifacts/
          if-no-files-found: error

      - name: Publish private symbols release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.symbol_token }}
          RELEASE_TAG: ${{ inputs.release_version }}
          SYMBOL_RELEASE_PREFIX: ${{ inputs.symbol_release_prefix }}
          SYMBOL_PRODUCT_NAME: ${{ inputs.symbol_product_name }}
          SYMBOLS_REPO: Nonary/vibeshine_symbols
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "SYMBOL_TOKEN is required to upload private symbols to $($env:SYMBOLS_REPO)."
          }

          $sourceReleaseTag = $env:RELEASE_TAG
          $releaseVersion = $sourceReleaseTag
          if ($releaseVersion -match '^v(.+)$') {
            $releaseVersion = $Matches[1]
          }

          if ($releaseVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+((-(alpha|beta|rc)([.-][0-9A-Za-z.-]+)?)|-stable)?$') {
            throw "Unsupported release tag '$sourceReleaseTag'. Expected a release tag like v1.15.2-beta.2."
          }

          if ($env:SYMBOL_RELEASE_PREFIX -notmatch '^(shine|polo)$') {
            throw "Unsupported symbol release prefix '$($env:SYMBOL_RELEASE_PREFIX)'. Expected 'shine' or 'polo'."
          }

          $symbolReleaseTag = "$($env:SYMBOL_RELEASE_PREFIX)_$releaseVersion"
          $prerelease = ($releaseVersion -match '-(alpha|beta|rc)([.-][0-9A-Za-z.-]+)?$')
          $symbolPack = Join-Path (Join-Path $PWD 'symbols') "$($env:SYMBOL_PRODUCT_NAME)Symbols-$releaseVersion-windows-x64.7z"

          if (-not (Test-Path -LiteralPath $symbolPack)) {
            Get-ChildItem -Path symbols -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }
            throw "Private symbol pack not found: $symbolPack"
          }

          $releaseTitle = "$($env:SYMBOL_PRODUCT_NAME) symbols v$releaseVersion"
          $releaseNotes = "Private Windows debug symbols for $($env:SYMBOL_PRODUCT_NAME) v$releaseVersion (source release $sourceReleaseTag)."
          $releaseArgs = @('--repo', $env:SYMBOLS_REPO, '--title', $releaseTitle, '--notes', $releaseNotes)
          if ($prerelease) {
            $releaseArgs += '--prerelease'
          }

          $oldNativeCommandPreference = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false
          & gh release view $symbolReleaseTag --repo $env:SYMBOLS_REPO *> $null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $PSNativeCommandUseErrorActionPreference = $oldNativeCommandPreference

          if ($releaseExists) {
            & gh release edit $symbolReleaseTag @releaseArgs
            if ($LASTEXITCODE -ne 0) { throw "Failed to update private symbols release '$symbolReleaseTag'." }
            & gh release upload $symbolReleaseTag $symbolPack --repo $env:SYMBOLS_REPO --clobber
            if ($LASTEXITCODE -ne 0) { throw "Failed to upload private symbol pack '$symbolPack'." }
          } else {
            & gh release create $symbolReleaseTag $symbolPack @releaseArgs
            if ($LASTEXITCODE -ne 0) { throw "Failed to create private symbols release '$symbolReleaseTag'." }
          }

          $releaseId = & gh api "repos/$($env:SYMBOLS_REPO)/releases/tags/$symbolReleaseTag" --jq .id
          if ($LASTEXITCODE -ne 0) { throw "Failed to resolve private symbols release id for '$symbolReleaseTag'." }
          $prereleaseValue = if ($prerelease) { 'true' } else { 'false' }
          & gh api `
            --method PATCH `
            "repos/$($env:SYMBOLS_REPO)/releases/$releaseId" `
            -F "prerelease=$prereleaseValue" `
            *> $null
          if ($LASTEXITCODE -ne 0) { throw "Failed to set private symbols release prerelease state for '$symbolReleaseTag'." }
