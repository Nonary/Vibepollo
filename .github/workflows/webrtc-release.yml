---
name: WebRTC Release
permissions: {}

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Create/update the pinned WebRTC GitHub release asset.
        required: true
        default: true
        type: boolean
      allow_replace:
        description: Allow replacing an existing release asset with different bytes.
        required: true
        default: false
        type: boolean

jobs:
  windows-x64:
    name: Windows x64
    runs-on: windows-2022
    permissions:
      contents: write
    env:
      VIBEPOLLO_DEPS_DIR: ${{ github.workspace }}\.vibepollo-deps
      WEBRTC_ROOT: ${{ github.workspace }}\.vibepollo-deps\libwebrtc\out
      WEBRTC_REPO_URL: https://github.com/webrtc-sdk/webrtc.git
      WEBRTC_BRANCH: m125_release
      WEBRTC_CONFIGURATION: Release
      WEBRTC_TOOLCHAIN: ucrt-x86_64
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: false

      - name: Checkout libwebrtc wrapper
        run: |
          git submodule sync -- third-party/libwebrtc
          git submodule update --init --recursive --depth 1 third-party/libwebrtc

      - name: Setup WebRTC MSYS2 tools
        id: setup-msys2
        uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda  # v2.30.0
        with:
          msystem: ucrt64
          update: true
          install: >-
            git
            mingw-w64-ucrt-x86_64-binutils
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-tools
            wget

      - name: Resolve WebRTC toolchain
        env:
          MSYS2_LOCATION: ${{ steps.setup-msys2.outputs.msys2-location }}
        run: |
          $ErrorActionPreference = 'Stop'

          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          if (-not (Test-Path -LiteralPath $vswhere)) {
            throw "vswhere.exe was not found at $vswhere"
          }

          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vsPath) -or -not (Test-Path -LiteralPath $vsPath)) {
            throw 'Visual Studio with the VC toolchain was not found.'
          }

          $kitsRoot = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots' -Name KitsRoot10).KitsRoot10
          if ([string]::IsNullOrWhiteSpace($kitsRoot) -or -not (Test-Path -LiteralPath $kitsRoot)) {
            throw 'Windows SDK KitsRoot10 was not found.'
          }

          if ([string]::IsNullOrWhiteSpace($env:MSYS2_LOCATION) -or -not (Test-Path -LiteralPath $env:MSYS2_LOCATION)) {
            throw "MSYS2 location was not found: $($env:MSYS2_LOCATION)"
          }

          $msys2Bin = Join-Path $env:MSYS2_LOCATION 'ucrt64\bin'
          if (-not (Test-Path -LiteralPath $msys2Bin)) {
            throw "MSYS2 bin directory was not found: $msys2Bin"
          }

          "WEBRTC_VS_PATH=$vsPath" >> $env:GITHUB_ENV
          "WEBRTC_WINSDK_DIR=$kitsRoot" >> $env:GITHUB_ENV
          "WEBRTC_MSYS2_BIN=$msys2Bin" >> $env:GITHUB_ENV

      - name: Compute WebRTC cache keys
        id: webrtc-cache-keys
        run: |
          $ErrorActionPreference = 'Stop'

          .\scripts\get_webrtc_cache_keys.ps1 `
            -RootDir $PWD `
            -RunnerOs Windows `
            -Toolchain $env:WEBRTC_TOOLCHAIN `
            -Configuration $env:WEBRTC_CONFIGURATION `
            -WebrtcRepoUrl $env:WEBRTC_REPO_URL `
            -WebrtcRef $env:WEBRTC_BRANCH

      - name: Restore WebRTC source cache
        id: restore-webrtc-source
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: |
            .vibepollo-deps/libwebrtc/src
          key: ${{ steps.webrtc-cache-keys.outputs.source-key }}
          restore-keys: |
            ${{ steps.webrtc-cache-keys.outputs.source-restore-prefix }}

      - name: Sync WebRTC sources
        if: steps.restore-webrtc-source.outputs.cache-hit != 'true'
        run: |
          $ErrorActionPreference = 'Stop'

          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_mingw_webrtc.ps1 `
            -RootDir $PWD `
            -BuildDir (Join-Path $env:VIBEPOLLO_DEPS_DIR 'libwebrtc\src') `
            -OutDir $env:WEBRTC_ROOT `
            -Configuration Release `
            -WebrtcRepoUrl $env:WEBRTC_REPO_URL `
            -WebrtcBranch '${{ steps.webrtc-cache-keys.outputs.webrtc-source-revision }}' `
            -Msys2Bin $env:WEBRTC_MSYS2_BIN `
            -VisualStudioPath $env:WEBRTC_VS_PATH `
            -WinSdkDir $env:WEBRTC_WINSDK_DIR `
            -Stage Sync

      - name: Save WebRTC source cache
        if: steps.restore-webrtc-source.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: |
            .vibepollo-deps/libwebrtc/src
          key: ${{ steps.webrtc-cache-keys.outputs.source-key }}

      - name: Restore WebRTC output cache
        id: restore-webrtc-output
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: |
            .vibepollo-deps/libwebrtc/out
          key: ${{ steps.webrtc-cache-keys.outputs.output-key }}

      - name: Build WebRTC artifacts
        env:
          WEBRTC_OUTPUT_CACHE_HIT: ${{ steps.restore-webrtc-output.outputs.cache-hit }}
        run: |
          $ErrorActionPreference = 'Stop'

          $include = Join-Path $env:WEBRTC_ROOT 'include\libwebrtc.h'
          $dll = Join-Path $env:WEBRTC_ROOT 'lib\libwebrtc.dll'
          $importLib = Join-Path $env:WEBRTC_ROOT 'lib\libwebrtc.dll.a'

          if ($env:WEBRTC_OUTPUT_CACHE_HIT -eq 'true' -and
              (Test-Path -LiteralPath $include) -and
              (Test-Path -LiteralPath $dll) -and
              (Test-Path -LiteralPath $importLib)) {
            Write-Host "Using cached WebRTC artifacts from $env:WEBRTC_ROOT"
            exit 0
          }

          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build_mingw_webrtc.ps1 `
            -RootDir $PWD `
            -BuildDir (Join-Path $env:VIBEPOLLO_DEPS_DIR 'libwebrtc\src') `
            -OutDir $env:WEBRTC_ROOT `
            -Configuration Release `
            -WebrtcRepoUrl $env:WEBRTC_REPO_URL `
            -WebrtcBranch '${{ steps.webrtc-cache-keys.outputs.webrtc-source-revision }}' `
            -Msys2Bin $env:WEBRTC_MSYS2_BIN `
            -VisualStudioPath $env:WEBRTC_VS_PATH `
            -WinSdkDir $env:WEBRTC_WINSDK_DIR `
            -Stage Build

      - name: Save WebRTC output cache
        if: steps.restore-webrtc-output.outputs.cache-hit != 'true'
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
        with:
          path: |
            .vibepollo-deps/libwebrtc/out
          key: ${{ steps.webrtc-cache-keys.outputs.output-key }}

      - name: Package WebRTC release asset
        id: package
        run: |
          $ErrorActionPreference = 'Stop'

          .\scripts\package_webrtc_release.ps1 `
            -RootDir $PWD `
            -OutDir $env:WEBRTC_ROOT `
            -ArtifactDir (Join-Path $env:RUNNER_TEMP 'webrtc-release') `
            -ReleaseRepository $env:GITHUB_REPOSITORY `
            -RunnerOs Windows `
            -Toolchain $env:WEBRTC_TOOLCHAIN `
            -Configuration $env:WEBRTC_CONFIGURATION `
            -WebrtcRepoUrl $env:WEBRTC_REPO_URL `
            -WebrtcRef $env:WEBRTC_BRANCH

      - name: Upload packaged WebRTC artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
        with:
          name: ${{ steps.package.outputs.release-tag }}
          path: |
            ${{ steps.package.outputs.asset-path }}
            ${{ steps.package.outputs.manifest-path }}
          if-no-files-found: error
          retention-days: 7

      - name: Publish WebRTC release
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $allowReplace = '${{ inputs.allow_replace }}' -eq 'true'
          $args = @(
            '-ManifestPath', '${{ steps.package.outputs.manifest-path }}',
            '-AssetPath', '${{ steps.package.outputs.asset-path }}',
            '-NotesPath', '${{ steps.package.outputs.notes-path }}'
          )
          if ($allowReplace) {
            $args += '-AllowReplace'
          }

          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\publish_webrtc_release.ps1 @args
